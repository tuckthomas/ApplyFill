name: applyfill

services:
  postgres:
    container_name: applyfill-postgres
    image: postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
    restart: unless-stopped
    environment:
      POSTGRES_DB: applyfill
      POSTGRES_USER: applyfill_admin
      POSTGRES_PASSWORD: ${APPLYFILL_POSTGRES_ADMIN_PASSWORD:?Set APPLYFILL_POSTGRES_ADMIN_PASSWORD}
      POSTGRES_APP_PASSWORD: ${APPLYFILL_POSTGRES_APP_PASSWORD:?Set APPLYFILL_POSTGRES_APP_PASSWORD}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:${APPLYFILL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - applyfill-postgres-18:/var/lib/postgresql
      - ./scripts/database/init-application-role.sh:/docker-entrypoint-initdb.d/10-application-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applyfill_admin -d applyfill"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - applyfill-private
    security_opt:
      - no-new-privileges:true

networks:
  applyfill-private:
    driver: bridge

volumes:
  applyfill-postgres-18:
    name: applyfill-postgres-18
